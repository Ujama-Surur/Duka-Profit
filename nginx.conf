# Duka Profit Nginx Configuration Template
# Place this in /etc/nginx/sites-available/duka-profit (or use as reference in nginx.conf)
# Make sure to run `sudo ln -s /etc/nginx/sites-available/duka-profit /etc/nginx/sites-enabled/` and `sudo nginx -t`

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect to SSL (uncomment this after configuring Certbot/SSL keys)
    # return 301 https://$host$request_uri;

    # If running HTTP-only temporarily:
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

